name: RoK Data Sync
on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '24' # Future-proofed to Node 24
      
      - name: Install Dependencies
        run: npm install

      - name: Run Scraper
        run: node sync.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # This line opts you into the new Node 24 runner logic
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
